services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    restart: always
    ports:
      - "21165:21165"
    depends_on:
      oraculo:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-mongodb://admin:example@oraculo:27017/oraculo?authSource=admin}
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - JWT_EXPIRES_IN=24h
      - PORT=21165
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - NODE_OPTIONS=--max-old-space-size=1024
    networks:
      - app
    mem_limit: 1g
    cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:21165}
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
    networks:
      - app
    mem_limit: 128m
    cpus: "0.2"

  oraculo:
    build:
      context: ./oraculo
      dockerfile: dockerfile
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-example}
    volumes:
      - mongodb_data:/data/db
    networks:
      - app
    mem_limit: 256m
    cpus: "0.3"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  app:
    driver: bridge

volumes:
  mongodb_data:
