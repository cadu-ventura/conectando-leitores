name: SonarQube Oraculo

on:
  push:
    branches: [ "main" ]

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # BACKEND
      - name: Backend - Install dependencies
        working-directory: backend
        run: yarn install --frozen-lockfile

      - name: Backend - Run tests with coverage
        working-directory: backend
        run: yarn test:cov || true

      # FRONTEND
      - name: Frontend - Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
        
      # SONARQUBE SCAN
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=oraculo
            -Dsonar.projectName=Oraculo
            -Dsonar.modules=backend,frontend
            
            -Dsonar.coverage.exclusions=backend/**,frontend/**   
